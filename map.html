<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>鹿港老街的故事座標：地圖說書人</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* CSS 樣式：設定地圖顯示區塊的大小 */
        #map {
            height: 100vh; /* 讓地圖佔滿整個視窗高度 */
            width: 100%;  /* 讓地圖佔滿整個視窗寬度 */
        }
        /* 資訊視窗的樣式調整，讓故事內容更易讀 */
        .info-window-content {
            max-width: 400px;
            padding: 5px;
        }
        .info-window-content h4 {
            font-size: 20px;
            margin-top: 0;
            color: #C0392B; /* 鹿港紅 */
        }
        .info-window-content p {
            font-size: 18px;
            line-height: 1.5;
        }

        /* --- 新增：圖片廊樣式 (開始) --- */
        .image-gallery {
            display: flex; /* 讓圖片水平排列 */
            overflow-x: auto; /* 如果圖片超出寬度，允許水平捲動 */
            gap: 10px; /* 圖片之間的間距 */
            margin-bottom: 15px;
            padding-bottom: 5px; /* 避免捲軸貼太近 */
            /* 讓捲動順暢一點 */
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        /* 定義圖片廊裡面的每一張圖片 */
        .image-gallery img {
            height: 220px; /* 固定高度，讓排列整齊 */
            width: auto;   /* 寬度自動調整 */
            object-fit: cover; /* 保持圖片比例填滿 */
            border-radius: 8px; /* 圓角 */
            flex-shrink: 0; /* 防止圖片被擠壓變形 */
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        /* --- 新增：圖片廊樣式 (結束) --- */

        /* 讓頁面邊距歸零 */
        body {
            margin: 0;
            padding: 0;
        }
        /* 篩選選單的樣式，讓它浮在地圖上方 */
        #filter-container {
            position: absolute;
            top: 60px;
            left: 10px;
            z-index: 10; /* 確保選單在地圖之上 */
            background-color: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 2px 6px rgba(0,0,0,.3);
            font-family: Arial, sans-serif;
            font-size: 15px;
        }
        #category-filter {
            padding: 5px;
            border-radius: 3px;
        }
    </style>
</head>
<body>

    <div id="filter-container">
        <label for="category-filter">選擇顯示分類:</label>
        <select id="category-filter" onchange="filterMarkers(this.value)">
            <option value="全部">全部</option>
            <option value="古蹟">古蹟</option>
            <option value="店家">店家</option>
        </select>
    </div>

    <div id="map"></div>

    <script src="data.js"></script>

    <script>
        // *** 初始化 Google 地圖和標記功能 ***

        let map;
        let infoWindow;
        let markers = [];

        function initMap() {
            const lukangCenter = { lat: 24.0573, lng: 120.4340 };

            map = new google.maps.Map(document.getElementById("map"), {
                zoom: 17,
                center: lukangCenter,
                mapTypeId: 'roadmap',
            });

            infoWindow = new google.maps.InfoWindow();

            if (typeof lukangData !== 'undefined' && Array.isArray(lukangData)) {
                lukangData.forEach(data => {
                    addMarker(data);
                });
            } else {
                console.error("錯誤：找不到 lukangData 陣列，請確認 data.js 檔案已正確載入並包含資料。");
            }
        }

        // 創建標記和綁定資訊視窗的函式
        function addMarker(data) {
            const marker = new google.maps.Marker({
                position: { lat: data.lat, lng: data.lng },
                map: map,
                title: data.name,
                icon: getMarkerIcon(data.category),
                category: data.category
            });

            markers.push(marker);

            const navUrl = `https://www.google.com/maps/dir/?api=1&destination=${data.lat},${data.lng}&travelmode=walking`;

            // --- 修改：處理多張圖片的內容 ---
            let imageHtml = '';

            // 檢查 data.imageUrls 是否存在且是一個有內容的陣列
            if (data.imageUrls && Array.isArray(data.imageUrls) && data.imageUrls.length > 0) {
                // 開始建立圖片廊容器
                imageHtml += '<div class="image-gallery">';

                // 使用 forEach 迴圈遍歷陣列中的每一個網址
                data.imageUrls.forEach(url => {
                    // 將每個網址生成一個 <img> 標籤並串接起來
                    imageHtml += `<img src="${url}" alt="${data.name}照片">`;
                });

                // 結束圖片廊容器
                imageHtml += '</div>';
            }
            // (選用) 向下相容：如果某些舊資料還是用單一 imageUrl 欄位，也可以顯示
            else if (data.imageUrl) {
                 imageHtml = `<div class="image-gallery"><img src="${data.imageUrl}" alt="${data.name}照片"></div>`;
            }
            // --- 修改結束 ---


            // 2. 創建資訊視窗的 HTML 內容 (加入導航按鈕)
            const content = `
                <div class="info-window-content">
                    ${imageHtml} <h4>${data.name} <span style="font-size:12px; color:#666;">(${data.category})</span></h4>
                    <p><strong>地址:</strong> ${data.address}</p>
                    <p><strong>故事:</strong> ${data.story}</p>
                    <hr>
                    <a href="${navUrl}" target="_blank" style="
                        display: block;
                        background-color: #C0392B;
                        color: white;
                        text-align: center;
                        padding: 10px;
                        text-decoration: none;
                        border-radius: 5px;
                        font-weight: bold;
                    ">📍 開始導航 (步行)</a>
                </div>
            `;

            // 3. 監聽點擊
            marker.addListener("click", () => {
                infoWindow.close();
                infoWindow.setContent(content);
                infoWindow.open({ anchor: marker, map: map });
            });
        }

        function getMarkerIcon(category) {
            let iconUrl;
            switch (category) {
                case "古蹟":
                    iconUrl = 'dot.png';
                    break;
                case "店家":
                    iconUrl = 'dot2.png';
                    break;
                default:
                    // 給一個預設值，避免找不到圖標
                    iconUrl = 'https://maps.google.com/mapfiles/ms/icons/red-dot.png'; 
            }
            return {
                url: iconUrl,
                scaledSize: new google.maps.Size(35, 42)
            };
        }

        function filterMarkers(selectedCategory) {
            if (infoWindow) {
                infoWindow.close();
            }

            markers.forEach(marker => {
                const shouldShow = (selectedCategory === '全部' || marker.category === selectedCategory);
                marker.setMap(shouldShow ? map : null);
            });
        }

        window.initMap = initMap;
        window.filterMarkers = filterMarkers;
    </script>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDVIaUxpl9GD5Loo0SpKoIXiC0SsT1DROY&callback=initMap" defer></script>

</body>
</html>
